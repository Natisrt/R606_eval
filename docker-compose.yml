services:
    web:
        image: php:8.1-apache
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
        depends_on:
            - db
        command: >
            bash -c "docker-php-ext-install pdo pdo_mysql && 
                     sleep 10 && 
                     php /var/www/html/migrate.php && 
                     apache2-foreground"

    db:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: localhost
            MYSQL_DATABASE: ma_bdd
            MYSQL_USER: db_user
            MYSQL_PASSWORD: db_pwd
        ports:
            - "3307:3306"
